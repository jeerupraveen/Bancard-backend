<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bancard vPOS – secure embedded payment checkout" />
  <title>Bancard Checkout | Secure Payment</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Bancard Checkout JS (test environment) -->
  <script src="https://vpos.infonet.com.py:8888/checkout/javascript/dist/bancard-checkout-3.0.0.js"></script>

<body>
  <div id="root"></div>
  <script>
    // Load Bancard Checkout based on environment
    const env = import.meta.env.MODE ;
    console.log(`Loading Bancard Checkout for environment: ${env}`);
    const scriptUrl = env === 'production' 
      ? 'https://vpos.infonet.com.py:8888/checkout/javascript/dist/bancard-checkout-3.0.0.js'
      : 'https://vpos.infonet.com.py/checkout/javascript/dist/bancard-checkout-3.0.0.js';
    
    const script = document.createElement('script');
    script.src = scriptUrl;
    document.head.appendChild(script);
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
